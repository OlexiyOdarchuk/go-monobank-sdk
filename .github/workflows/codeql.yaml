name: CodeQL

# GitHub's static analysis for security bugs. Free for public repos.
# Findings show up in the Security tab and as PR annotations.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catch newly-published queries against unchanged code — Mondays
    # 06:43 UTC, offset from the integration job (06:17) so we don't
    # contend for runners.
    - cron: '43 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
          cache: true
      - uses: github/codeql-action/init@5e316336eb4f107009e477d4bfbfff13d7250fae # v4
        with:
          languages: ${{ matrix.language }}
          # security-and-quality is the broader query suite — includes
          # security-extended plus maintainability checks.
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@5e316336eb4f107009e477d4bfbfff13d7250fae # v4
      - uses: github/codeql-action/analyze@5e316336eb4f107009e477d4bfbfff13d7250fae # v4
        with:
          category: '/language:${{ matrix.language }}'
