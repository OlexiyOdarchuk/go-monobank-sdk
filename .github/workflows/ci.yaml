name: CI
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:

# Cancel an older in-progress run when a newer commit lands on the same
# ref — saves CI minutes on rapid PR pushes. main / tag pushes are
# grouped per-ref too, so backfills don't pile up either.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.go }})
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25.x', '1.26.x']
    runs-on: ubuntu-latest
    # go.work pins the workspace at Go 1.25 (otelmonobank requires it),
    # but the test matrix exercises older toolchains too. CI tests each
    # module in isolation, so disable workspace mode here.
    env:
      GOWORK: 'off'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "::error::Unformatted files (run gofmt -w):"
            echo "$files"
            exit 1
          fi
      - run: go vet ./...
      - name: build examples
        # Surface example-program breakage as a distinct step even though
        # `go test ./...` already compiles them — keeps the signal obvious
        # and fast-fails before the (slower) test run.
        run: go build ./examples/...
      - run: go test -race -coverprofile=coverage.txt ./...
      - name: test otelmonobank sub-module
        run: |
          cd otelmonobank
          go vet ./...
          go test -race ./...
      - if: matrix.go == '1.25.x'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  race-stress:
    name: race-stress (10x)
    # 10× repeat of the race-detected test suite. Catches schedule-
    # dependent races (singleflight, sweeper) that pass a single -race
    # run by chance. Only runs on one Go version to keep the job under
    # ~2 min.
    runs-on: ubuntu-latest
    env:
      GOWORK: 'off'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
          cache: true
      - run: go test -count=10 -race -timeout=300s ./...

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    # Don't fail the whole build — most hits are stdlib CVEs whose fix
    # ships in a Go patch a few days before GitHub's runners update.
    # The report still shows up in the job summary.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan root module
        run: govulncheck ./...
      - name: scan otelmonobank submodule
        run: |
          cd otelmonobank
          govulncheck ./...
