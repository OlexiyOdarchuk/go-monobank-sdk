ignore:
  - "examples/**"
  - "**/*_test.go"
  - "monobanktest/**"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  require_changes: true
