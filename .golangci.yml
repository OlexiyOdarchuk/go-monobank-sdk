version: "2"

linters:
  # Opt-in set (do not use the deprecated enable-all/disable inversion).
  default: none
  enable:
    - errcheck
    - nilerr
    - ineffassign
    - staticcheck # in v2 also subsumes the former gosimple + stylecheck
    - gosec
    - bodyclose

    - dogsled
    - dupl
    - exhaustive
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - govet
    - lll
    - misspell
    - nakedret
    # - noctx # TODO: enable
    - nolintlint
    - nlreturn
    - prealloc
    - revive
    - rowserrcheck
    - unconvert
    - unparam
    - unused
    # - depguard # TODO: enable
    # - err113 # TODO: enable

  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport # https://github.com/go-critic/go-critic/issues/845
        - octalLiteral
        - wrapperFunc
        - whyNoLint
    gocyclo:
      min-complexity: 15
    exhaustive:
      # A switch with a default clause is exhaustive — these are
      # state-machine maps (InvoiceStatus, etc.) with explicit defaults.
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G505 # crypto/sha1 import — Mono's X-Key-Id format (identifier, not signing)
        - G401 # sha1 usage — same X-Key-Id format
        - G115 # int64<->uint64 conversions in money pkg are deliberate two's-complement overflow detection
    govet:
      enable:
        - shadow
    lll:
      line-length: 140
    misspell:
      locale: US
      # "cancelled" is Mono's wire value (acquiring subscription status)
      # and the SDK's public identifier (SubscriptionCancelled); it must
      # not be "corrected" to the US "canceled".
      ignore-rules:
        - cancelled
    nolintlint:
      allow-unused: false # report any unused nolint directives
      require-explanation: false # don't require an explanation for nolint directives
      require-specific: true # require nolint directives to name the linter being skipped

  exclusions:
    # Keep golangci-lint's built-in sensible exclusions.
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      # Runnable demos are illustrative, not library code: they
      # legitimately log user input, serve without timeouts, etc.
      # Lint the SDK, not the demos.
      - examples/

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/OlexiyOdarchuk/go-monobank-sdk

issues:
  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0
  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 50
